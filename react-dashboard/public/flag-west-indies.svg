<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <!-- Maroon background (WI cricket signature colour) -->
  <rect width="120" height="80" fill="#6B0F1A"/>
  <!-- Gold diagonal stripes (inspired by CARICOM/WI heritage) -->
  <polygon points="0,0 40,0 0,40" fill="#FFD700" opacity="0.18"/>
  <polygon points="120,80 80,80 120,40" fill="#FFD700" opacity="0.18"/>
  <!-- Central gold ring -->
  <circle cx="60" cy="40" r="22" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.85"/>
  <!-- Cricket stumps (3 stumps + bails) -->
  <g fill="#FFD700" opacity="0.95">
    <!-- Stumps -->
    <rect x="47" y="31" width="3.5" height="18" rx="1"/>
    <rect x="58.25" y="31" width="3.5" height="18" rx="1"/>
    <rect x="69.5" y="31" width="3.5" height="18" rx="1"/>
    <!-- Bails -->
    <rect x="46" y="29.5" width="13" height="2.5" rx="1"/>
    <rect x="59" y="29.5" width="13" height="2.5" rx="1"/>
  </g>
  <!-- "WI" text below stumps -->
  <text x="60" y="58" font-family="Arial Black,Arial,sans-serif" font-size="9"
        font-weight="900" fill="#FFD700" text-anchor="middle" letter-spacing="3"
        opacity="0.9">WEST INDIES</text>
</svg>
